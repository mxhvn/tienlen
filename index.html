<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>TLMN Tracker • Pro</title>
  <style>
    :root{
      --bg:#0b1220; --card:rgba(255,255,255,.06); --stroke:rgba(255,255,255,.10);
      --text:#eaf0ff; --muted:rgba(234,240,255,.70);
      --danger:#ff5a67; --ok:#34d399;
      --r:16px; --shadow:0 20px 60px rgba(0,0,0,.45);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }
    body{ margin:0; background:
        radial-gradient(1000px 600px at 20% -10%, rgba(39,198,255,.18), transparent 60%),
        radial-gradient(1000px 600px at 80% 0%, rgba(168,85,247,.16), transparent 60%),
        var(--bg);
      color:var(--text);
    }
    .wrap{ max-width:1180px; margin:28px auto; padding:0 18px; }
    .top{ display:flex; gap:14px; align-items:center; justify-content:space-between; flex-wrap:wrap; }
    .brand{ display:flex; gap:10px; align-items:center; }
    .logo{ width:40px; height:40px; border-radius:12px; background:rgba(39,198,255,.18); border:1px solid var(--stroke); box-shadow:var(--shadow); }
    h1{ font-size:18px; margin:0; letter-spacing:.3px;}
    .sub{ font-size:12px; color:var(--muted); margin-top:3px;}
    .grid{ display:grid; grid-template-columns: 380px 1fr; gap:14px; margin-top:14px; }
    @media (max-width: 980px){ .grid{ grid-template-columns:1fr; } }
    .card{ background:var(--card); border:1px solid var(--stroke); border-radius:var(--r); box-shadow:var(--shadow); }
    .card .hd{ padding:12px 12px 0 12px; display:flex; justify-content:space-between; align-items:center; }
    .card .bd{ padding:12px; }
    .ttl{ font-size:13px; color:var(--muted); }
    .btn{ cursor:pointer; border:1px solid var(--stroke); background:rgba(255,255,255,.06); color:var(--text);
          padding:9px 12px; border-radius:12px; font-weight:700; }
    .btn.primary{ background:linear-gradient(135deg, rgba(39,198,255,.18), rgba(168,85,247,.14)); }
    .btn.danger{ background:rgba(255,90,103,.10); border-color:rgba(255,90,103,.30); }
    .row{ display:flex; gap:10px; flex-wrap:wrap; }
    .field{ display:flex; flex-direction:column; gap:6px; margin-bottom:10px; flex:1; }
    .field label{ font-size:12px; color:var(--muted); }
    input, select, textarea{
      border:1px solid var(--stroke); background:rgba(0,0,0,.18); color:var(--text);
      border-radius:12px; padding:10px 10px; outline:none;
    }
    textarea{ min-height:70px; resize:vertical; }
    table{ width:100%; border-collapse:collapse; }
    th,td{ padding:10px; border-bottom:1px solid rgba(255,255,255,.08); font-size:13px; }
    th{ color:var(--muted); font-weight:700; text-align:left; }
    .pill{ display:inline-flex; padding:4px 9px; border-radius:999px; border:1px solid var(--stroke); font-size:12px; color:var(--muted); }
    .pos{ color:var(--ok); font-weight:900; }
    .neg{ color:var(--danger); font-weight:900; }
    .muted{ color:var(--muted); }
    .toast{ margin-top:10px; font-size:12px; color:var(--muted); }
    .hr{ height:1px; background:rgba(255,255,255,.08); margin:12px 0; }
    .badge{ display:inline-flex; gap:6px; align-items:center; padding:6px 10px; border-radius:999px;
      border:1px solid rgba(255,255,255,.10); background:rgba(0,0,0,.12); font-size:12px; color:var(--muted); }
    .settle{ display:grid; gap:10px; margin-top:10px; }
    .settle-item{ display:flex; justify-content:space-between; gap:10px; padding:10px; border:1px solid rgba(255,255,255,.08); border-radius:14px; background:rgba(0,0,0,.12); }
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand">
      <div class="logo"></div>
      <div>
        <h1>TLMN Tracker Pro</h1>
        <div class="sub">Session PIN • Fixed Rules • Worker + GitHub Pages</div>
      </div>
    </div>
    <div class="row">
      <button class="btn" id="btnReload">Reload</button>
      <button class="btn primary" id="btnNewSession">New session</button>
    </div>
  </div>

  <div class="grid">
    <!-- Left -->
    <div class="card">
      <div class="hd">
        <div class="ttl">Sessions</div>
        <span class="pill" id="pillHealth">offline</span>
      </div>
      <div class="bd">
        <div class="badge" id="ruleLine">Rules: —</div>

        <div class="field" style="margin-top:12px;">
          <label>Select session</label>
          <select id="sessionSelect"></select>
        </div>

        <div class="row">
          <button class="btn" id="btnOpen">Open</button>
          <button class="btn danger" id="btnEnd">End session</button>
        </div>

        <div class="hr"></div>

        <div class="field">
          <label>Session PIN (4 digits) • chỉ cần nhập 1 lần / thiết bị</label>
          <input id="pinInput" inputmode="numeric" maxlength="4" placeholder="1234"/>
        </div>
        <button class="btn" id="btnSavePin">Save PIN</button>

        <div class="toast" id="toastLeft"></div>
      </div>
    </div>

    <!-- Right -->
    <div class="card">
      <div class="hd">
        <div class="ttl" id="sessionTitle">No session opened</div>
        <span class="pill" id="sessionMeta">—</span>
      </div>
      <div class="bd">
        <div class="row" style="justify-content:space-between; align-items:center;">
          <div>
            <div class="ttl">Balances</div>
            <div class="sub muted" id="playersLine"></div>
          </div>
          <button class="btn" id="btnRefresh">Refresh</button>
        </div>

        <div style="margin-top:10px;" id="balancesBox"></div>

        <div class="hr"></div>

        <div class="ttl">Settlement</div>
        <div class="settle" id="settlementBox">—</div>

        <div class="hr"></div>

        <div class="ttl">Add round</div>
        <div class="row" style="margin-top:10px;">
          <div class="field"><label>Nhất</label><select id="firstPlayer"></select></div>
          <div class="field"><label>Nhì</label><select id="secondPlayer"></select></div>
          <div class="field"><label>Về 3</label><select id="thirdPlayer"></select></div>
          <div class="field"><label>Chót</label><select id="lastPlayer"></select></div>
        </div>

        <div class="row" style="margin-top:10px;">
          <div class="field">
            <label>Thưởng trắng (optional)</label>
            <select id="whiteWinner"></select>
          </div>
          <div class="field">
            <label>Giết trắng (optional)</label>
            <select id="killWhite"></select>
          </div>
        </div>

        <div class="ttl">Chặt heo (optional) • BLACK=10k • RED=20k</div>
        <div class="row" style="margin-top:10px;">
          <div class="field"><label>Người chặt</label><select id="cutCutter"></select></div>
          <div class="field"><label>Người bị chặt</label><select id="cutVictim"></select></div>
          <div class="field" style="max-width:170px;">
            <label>Màu</label>
            <select id="cutColor">
              <option value="BLACK">Heo đen (10k)</option>
              <option value="RED">Heo đỏ (20k)</option>
            </select>
          </div>
          <div class="field" style="max-width:120px;">
            <label>Số lần</label>
            <input id="cutQty" type="number" min="1" value="1"/>
          </div>
          <div class="field" style="align-self:flex-end; max-width:160px;">
            <button class="btn" id="btnAddCut">Add cut</button>
          </div>
        </div>

        <div id="cutsList" class="muted" style="font-size:12px;"></div>

        <div class="field" style="margin-top:10px;">
          <label>Note</label>
          <textarea id="roundNote" placeholder="Ghi chú (tuỳ chọn)"></textarea>
        </div>

        <div class="row">
          <button class="btn primary" id="btnSubmitRound">Submit round</button>
          <button class="btn" id="btnClearCuts">Clear cuts</button>
        </div>

        <div class="toast" id="toastRight"></div>

        <div class="hr"></div>

        <div class="ttl">Recent rounds</div>
        <div style="margin-top:10px;" id="roundsBox" class="muted">—</div>
      </div>
    </div>
  </div>
</div>

<script>
  const API_BASE = "https://tienlen.testmail12071997.workers.dev";
  const $ = (id)=>document.getElementById(id);

  function toast(el, msg){ el.textContent = msg; }
  function fmt(n, currency="VND"){
    const v = Number(n||0);
    return v.toLocaleString("vi-VN") + " " + currency;
  }
  function getSavedPin(sessionId){
    return localStorage.getItem("tlmn_pin_" + sessionId) || "";
  }
  function setSavedPin(sessionId, pin){
    localStorage.setItem("tlmn_pin_" + sessionId, pin);
  }
  function isPin(pin){ return /^\d{4}$/.test(pin||""); }

  async function api(path, {method="GET", body=null, sessionIdForPin=null}={}){
    const url = API_BASE + path;
    const headers = { "Content-Type":"application/json" };
    if (sessionIdForPin) {
      const pin = getSavedPin(sessionIdForPin);
      if (pin) headers["X-Session-Pin"] = pin;
    }
    const res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : null });
    const data = await res.json().catch(()=>({ok:false,error:"Bad JSON"}));
    if (!res.ok || data.ok === false) throw new Error(data.error || ("HTTP " + res.status));
    return data;
  }

  let currentSessionId = null;
  let currentSession = null;
  let pendingCuts = [];
  let rules = null;

  function renderRules(){
    if (!rules) { $("ruleLine").textContent = "Rules: —"; return; }
    $("ruleLine").textContent =
      `Rules: Về3→Nhì ${fmt(rules.third_to_second)} | Chót→Nhất ${fmt(rules.last_to_first)} | Trắng ${fmt(rules.white_bonus_per_player)}/nhà | Giết trắng ${fmt(rules.kill_white_amount)} | Heo đen ${fmt(rules.pig_black)} | Heo đỏ ${fmt(rules.pig_red)}`;
  }

  function setPlayerOptions(players){
    const normal = ["firstPlayer","secondPlayer","thirdPlayer","lastPlayer","cutCutter","cutVictim"];
    for (const id of normal){
      const sel = $(id);
      sel.innerHTML = players.map(p=>`<option value="${p}">${p}</option>`).join("");
    }

    const optNone = (id)=>{
      const sel = $(id);
      sel.innerHTML = `<option value="">-- Không có --</option>` + players.map(p=>`<option value="${p}">${p}</option>`).join("");
    };
    optNone("whiteWinner");
    optNone("killWhite");

    if (players.length === 4){
      $("firstPlayer").value = players[0];
      $("secondPlayer").value = players[1];
      $("thirdPlayer").value = players[2];
      $("lastPlayer").value = players[3];
    }
  }

  function renderBalances(balances, players, currency){
    const rows = players.map(p=>{
      const b = Number(balances?.[p] || 0);
      const cls = b >= 0 ? "pos" : "neg";
      return `<tr><td>${p}</td><td class="${cls}">${fmt(b, currency)}</td></tr>`;
    }).join("");
    $("balancesBox").innerHTML = `
      <table>
        <thead><tr><th>Player</th><th>Balance</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  function renderSettlement(settlement, currency){
    if (!settlement?.length){ $("settlementBox").textContent = "—"; return; }
    $("settlementBox").innerHTML = settlement.map(t=>
      `<div class="settle-item"><div><b>${t.from}</b> trả <b>${t.to}</b></div><div class="pos">${fmt(t.amount, currency)}</div></div>`
    ).join("");
  }

  function renderRounds(rounds){
    if (!rounds?.length){ $("roundsBox").textContent = "—"; return; }
    $("roundsBox").innerHTML = rounds.map(r=>{
      const t = new Date(r.created_at).toLocaleString("vi-VN");
      const extra = [
        r.white_winner ? ` • <b>TRẮNG</b>: ${r.white_winner}` : "",
        r.kill_white_victim ? ` • <b>GIẾT</b>: ${r.kill_white_victim}` : ""
      ].join("");
      return `<div>#${r.idx} • Nhất: <b>${r.first_player}</b> • Nhì: <b>${r.second_player}</b> • Về3: <b>${r.third_player}</b> • Chót: <b>${r.last_player}</b>${extra} <span class="muted">(${t})</span></div>`;
    }).join("");
  }

  function renderCuts(){
    if (!pendingCuts.length){ $("cutsList").textContent = "No cuts added."; return; }
    $("cutsList").innerHTML = pendingCuts.map((c,i)=>
      `<div>#${i+1} ${c.cutter} chặt ${c.victim} • ${c.color} x${c.qty}</div>`
    ).join("");
  }

  function validateDistinctRanks(){
    const a=$("firstPlayer").value, b=$("secondPlayer").value, c=$("thirdPlayer").value, d=$("lastPlayer").value;
    if (new Set([a,b,c,d]).size !== 4){ toast($("toastRight"), "⚠️ 4 hạng phải là 4 người khác nhau."); return false; }
    return true;
  }

  async function health(){
    try{
      const res = await fetch(API_BASE + "/api/health");
      const data = await res.json();
      $("pillHealth").textContent = data.ok ? "online" : "offline";
      $("pillHealth").style.opacity = data.ok ? "1" : ".6";
    }catch{
      $("pillHealth").textContent = "offline";
      $("pillHealth").style.opacity = ".6";
    }
  }

  async function loadSessions(){
    const data = await api("/api/sessions");
    rules = data.rules;
    renderRules();

    $("sessionSelect").innerHTML = data.sessions.map(s=>{
      const ended = s.ended_at ? " (ended)" : "";
      return `<option value="${s.id}">${s.title}${ended} — ${new Date(s.created_at).toLocaleDateString("vi-VN")}</option>`;
    }).join("");
    toast($("toastLeft"), `Loaded ${data.sessions.length} sessions.`);
  }

  async function openSession(id){
    const data = await api(`/api/sessions/${id}`);
    currentSessionId = id;
    currentSession = data.session;
    rules = data.rules || rules;
    renderRules();

    $("sessionTitle").textContent = currentSession.title;
    $("sessionMeta").textContent = currentSession.is_locked ? "Locked" : "Live";
    $("playersLine").textContent = "Players: " + currentSession.players.join(" • ");
    setPlayerOptions(currentSession.players);

    // load saved pin
    const saved = getSavedPin(id);
    $("pinInput").value = saved || "";

    renderBalances(data.balances, currentSession.players, currentSession.currency);
    renderSettlement(data.settlement, currentSession.currency);
    renderRounds(data.rounds);

    pendingCuts = []; renderCuts();
    toast($("toastRight"), "Session opened.");
  }

  async function refreshSession(){ if (currentSessionId) await openSession(currentSessionId); }

  async function newSessionFlow(){
    const title = prompt("Tên session?", "TLMN - tối nay"); if (!title) return;
    const p1 = prompt("Player 1 name?", "A"); if (!p1) return;
    const p2 = prompt("Player 2 name?", "B"); if (!p2) return;
    const p3 = prompt("Player 3 name?", "C"); if (!p3) return;
    const p4 = prompt("Player 4 name?", "D"); if (!p4) return;

    const pin = prompt("Set PIN 4 số cho session (vd: 1234)"); if (!pin) return;
    if (!isPin(pin)) return toast($("toastLeft"), "PIN phải đúng 4 số.");

    const data = await api("/api/sessions", { method:"POST", body:{ title, currency:"VND", players:[p1,p2,p3,p4], pin } });
    setSavedPin(data.session.id, pin);

    await loadSessions();
    $("sessionSelect").value = data.session.id;
    await openSession(data.session.id);
  }

  $("btnSavePin").onclick = ()=>{
    if (!currentSessionId) return toast($("toastLeft"), "Open a session first.");
    const pin = $("pinInput").value.trim();
    if (!isPin(pin)) return toast($("toastLeft"), "PIN phải đúng 4 số.");
    setSavedPin(currentSessionId, pin);
    toast($("toastLeft"), "Saved PIN for this session.");
  };

  async function submitRound(){
    if (!currentSessionId) return toast($("toastRight"), "Open a session first.");
    if (currentSession?.is_locked) return toast($("toastRight"), "Session locked.");
    if (!validateDistinctRanks()) return;

    const whiteWinner = $("whiteWinner").value;
    const killWhite = $("killWhite").value;

    const body = {
      first_player: $("firstPlayer").value,
      second_player: $("secondPlayer").value,
      third_player: $("thirdPlayer").value,
      last_player: $("lastPlayer").value,
      whiteWinner,
      killWhite,
      cuts: pendingCuts,
      note: $("roundNote").value
    };

    try{
      await api(`/api/sessions/${currentSessionId}/rounds`, { method:"POST", body, sessionIdForPin: currentSessionId });
      pendingCuts = []; $("roundNote").value = ""; renderCuts();
      toast($("toastRight"), "✅ Round submitted.");
      await refreshSession();
    }catch(e){
      toast($("toastRight"), "Submit failed: " + e.message);
    }
  }

  async function endSession(){
    if (!currentSessionId) return;
    if (!confirm("End & lock this session?")) return;
    try{
      await api(`/api/sessions/${currentSessionId}/end`, { method:"POST", sessionIdForPin: currentSessionId });
      toast($("toastRight"), "✅ Session ended.");
      await refreshSession();
      await loadSessions();
    }catch(e){
      toast($("toastRight"), "End failed: " + e.message);
    }
  }

  $("btnReload").onclick = async ()=>{ await health(); await loadSessions(); };
  $("btnNewSession").onclick = ()=>newSessionFlow().catch(e=>toast($("toastLeft"), e.message));
  $("btnOpen").onclick = ()=>openSession($("sessionSelect").value).catch(e=>toast($("toastRight"), e.message));
  $("btnRefresh").onclick = ()=>refreshSession().catch(e=>toast($("toastRight"), e.message));
  $("btnSubmitRound").onclick = submitRound;
  $("btnEnd").onclick = endSession;

  $("btnAddCut").onclick = ()=>{
    if (!currentSession) return toast($("toastRight"), "Open a session first.");
    const cutter = $("cutCutter").value;
    const victim = $("cutVictim").value;
    const color = $("cutColor").value;
    const qty = Math.max(1, Number($("cutQty").value || 1) | 0);
    if (cutter === victim) return toast($("toastRight"), "Cutter and victim must differ.");
    pendingCuts.push({ cutter, victim, color, qty });
    renderCuts();
  };
  $("btnClearCuts").onclick = ()=>{ pendingCuts = []; renderCuts(); };

  (async function init(){
    renderCuts();
    await health();
    await loadSessions();
    renderRules();
  })();
</script>
</body>
</html>
