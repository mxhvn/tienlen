<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tiến Lên Tracker</title>

<style>

body{
  font-family:system-ui;
  background:#0f172a;
  color:white;
  margin:0;
  padding:20px;
}

h1{
  margin-top:0;
}

.container{
  max-width:1100px;
  margin:auto;
}

.card{
  background:#1e293b;
  padding:16px;
  border-radius:10px;
  margin-bottom:20px;
}

input,select,button{
  padding:6px;
  border-radius:6px;
  border:none;
}

button{
  cursor:pointer;
}

button.primary{
  background:#22c55e;
  color:white;
}

button.danger{
  background:#ef4444;
  color:white;
}

.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:8px;
  text-align:left;
}

tr:nth-child(even){
  background:#0f172a;
}

.pos{
  color:#22c55e;
}

.neg{
  color:#ef4444;
}

.round{
  padding:8px;
  border-bottom:1px solid #334155;
}

.badge{
  background:#334155;
  padding:2px 6px;
  border-radius:6px;
  font-size:12px;
}

</style>
</head>

<body>

<div class="container">

<h1>🃏 Tiến Lên Tracker</h1>

<div class="card">

<h2>Create Session</h2>

<div class="row">

<input id="p1" placeholder="Player A">
<input id="p2" placeholder="Player B">
<input id="p3" placeholder="Player C">
<input id="p4" placeholder="Player D">

<button class="primary" onclick="createSession()">Create</button>

</div>

</div>


<div class="card">

<h2>Sessions</h2>
<div id="sessions"></div>

</div>


<div id="gameArea" style="display:none">

<div class="card">

<h2>Add Round</h2>

<div class="row">

<select id="mode">
<option value="NORMAL">Normal</option>
<option value="WHITE">Thưởng trắng</option>
<option value="KILL">Nhốt (Kill)</option>
</select>

<select id="first"></select>
<select id="second"></select>
<select id="third"></select>
<select id="last"></select>

<button onclick="addRound()" class="primary">Add Round</button>

</div>

</div>


<div class="card">

<h2>Chặt Heo</h2>

<div class="row">

<select id="cutCutter"></select>
<select id="cutVictim"></select>

<input type="number" id="cutQty" min="1" value="1">

<button onclick="addCut()">Add</button>

</div>

</div>


<div class="card">

<h2>Leaderboard</h2>
<div id="leaderboard"></div>

</div>


<div class="card">

<h2>Tournament Stats</h2>
<div id="stats"></div>

</div>


<div class="card">

<h2>Rounds</h2>
<div id="rounds"></div>

</div>

</div>

</div>


<script>

const API="https://YOUR-WORKER.workers.dev"

let currentSession=null

const $=id=>document.getElementById(id)

function fmt(n){
  return n.toLocaleString()+" đ"
}

async function createSession(){

  const players=[
    $("p1").value,
    $("p2").value,
    $("p3").value,
    $("p4").value
  ]

  const r=await fetch(API+"/session",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({players})
  })

  loadSessions()

}

async function loadSessions(){

  const r=await fetch(API+"/sessions")
  const data=await r.json()

  $("sessions").innerHTML=data.sessions.map(s=>

  `<div>
  <button onclick="openSession('${s.id}')">
  ${s.players.join(" vs ")}
  </button>
  </div>`

  ).join("")

}

async function openSession(id){

  currentSession=id

  $("gameArea").style.display="block"

  const r=await fetch(API+"/session/"+id)
  const data=await r.json()

  renderPlayers(data.session.players)

  renderLeaderboard(data.balances)

  renderStats(data.scoreByPlayer,data.balances)

  renderRounds(data.rounds)

}

function renderPlayers(players){

  const selects=["first","second","third","last","cutCutter","cutVictim"]

  selects.forEach(s=>{
    $(s).innerHTML=players.map(p=>`<option>${p}</option>`).join("")
  })

}

function renderLeaderboard(balances){

  const rows=Object.entries(balances).map(([p,v])=>{

    const cls=v>=0?"pos":"neg"

    return `<tr>
    <td>${p}</td>
    <td class="${cls}">${fmt(v)}</td>
    </tr>`

  }).join("")

  $("leaderboard").innerHTML=

  `<table>
  <tr><th>Player</th><th>Net</th></tr>
  ${rows}
  </table>`

}

function renderStats(score,balances){

  const rows=Object.keys(score).map(p=>{

    const sc=score[p]
    const cls=sc>=0?"pos":"neg"

    return `<tr>
    <td>${p}</td>
    <td>${fmt(balances[p])}</td>
    <td class="${cls}">${sc}</td>
    </tr>`

  }).join("")

  $("stats").innerHTML=

  `<table>
  <tr>
  <th>Player</th>
  <th>Net</th>
  <th>Score</th>
  </tr>
  ${rows}
  </table>`

}

function renderRounds(rounds){

  $("rounds").innerHTML=rounds.map(r=>{

    let badge=""

    if(r.mode==="WHITE") badge="⭐"
    if(r.mode==="KILL") badge="💀"

    return `<div class="round">

    #${r.idx}
    <span class="badge">${r.mode}</span>
    ${badge}

    <br>

    Nhất: ${r.first_player}
    Nhì: ${r.second_player}
    Ba: ${r.third_player}
    Bét: ${r.last_player}

    </div>`

  }).join("")

}

async function addRound(){

  const body={

    mode:$("mode").value,

    first:$("first").value,
    second:$("second").value,
    third:$("third").value,
    last:$("last").value

  }

  await fetch(API+"/session/"+currentSession+"/round",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body)
  })

  openSession(currentSession)

}

async function addCut(){

  const body={

    cutter:$("cutCutter").value,
    victim:$("cutVictim").value,
    qty:parseInt($("cutQty").value)

  }

  await fetch(API+"/session/"+currentSession+"/cut",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body)
  })

  openSession(currentSession)

}

loadSessions()

</script>

</body>
</html>
