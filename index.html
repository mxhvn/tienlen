<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tiến Lên Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:system-ui;
background:#0f172a;
color:white;
margin:0;
padding:12px;
}

h2{
margin:10px 0;
}

.card{
background:#1e293b;
padding:14px;
border-radius:10px;
margin-bottom:12px;
}

input,button{
width:100%;
padding:12px;
margin-top:6px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
background:#22c55e;
color:white;
}

.playerbtn{
background:#334155;
margin:4px 0;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
}

.score{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid #334155;
}

.pos{color:#22c55e}
.neg{color:#ef4444}

.round{
font-size:14px;
border-bottom:1px solid #334155;
padding:6px 0;
}

</style>
</head>

<body>

<h2>🃏 Tiến Lên Tracker</h2>

<div class="card">

<b>Tạo bàn</b>

<input id="p1" placeholder="Player A">
<input id="p2" placeholder="Player B">
<input id="p3" placeholder="Player C">
<input id="p4" placeholder="Player D">

<button onclick="createSession()">Create</button>

</div>

<div class="card">

<b>Chọn bàn</b>
<div id="sessions"></div>

</div>

<div id="game" style="display:none">

<div class="card">

<b>Kết quả ván</b>

<label>Nhất</label>
<div id="first"></div>

<label>Nhì</label>
<div id="second"></div>

<label>Ba</label>
<div id="third"></div>

<label>Bét</label>
<div id="last"></div>

<button onclick="submitRound()">Lưu ván</button>

</div>

<div class="card">

<b>🐷 Chặt heo</b>

<label>Người chặt</label>
<div id="cutCutter"></div>

<label>Người bị chặt</label>
<div id="cutVictim"></div>

<div class="row">
<button onclick="cut(1)">🐷 x1</button>
<button onclick="cut(2)">🐷 x2</button>
</div>

</div>

<div class="card">

<b>Scoreboard</b>
<div id="scores"></div>

</div>

<div class="card">

<b>History</b>
<div id="rounds"></div>

</div>

</div>

<script>

const API="https://tienlen.testmail12071997.workers.dev"

let session=null
let players=[]
let roundData={}

const $=id=>document.getElementById(id)

function fmt(n){
return n.toLocaleString()+"đ"
}

async function createSession(){

const p=[p1.value,p2.value,p3.value,p4.value]

await fetch(API+"/session",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({players:p})
})

loadSessions()

}

async function loadSessions(){

const r=await fetch(API+"/sessions")
const data=await r.json()

sessions.innerHTML=data.sessions.map(s=>

`<button class="playerbtn"
onclick="openSession('${s.id}')">

${s.players.join(" vs ")}

</button>`

).join("")

}

async function openSession(id){

session=id

game.style.display="block"

const r=await fetch(API+"/session/"+id)
const data=await r.json()

players=data.session.players

renderPlayers()

renderScores(data.balances)

renderRounds(data.rounds)

}

function renderPlayers(){

function buttons(target,key){

$(target).innerHTML=players.map(p=>

`<button class="playerbtn"
onclick="set('${key}','${p}')">

${p}

</button>`

).join("")

}

buttons("first","first")
buttons("second","second")
buttons("third","third")
buttons("last","last")

buttons("cutCutter","cutter")
buttons("cutVictim","victim")

}

function set(k,v){

roundData[k]=v

}

async function submitRound(){

await fetch(API+"/session/"+session+"/round",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(roundData)
})

roundData={}

openSession(session)

}

async function cut(qty){

await fetch(API+"/session/"+session+"/cut",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({

cutter:roundData.cutter,
victim:roundData.victim,
qty

})
})

openSession(session)

}

function renderScores(bal){

scores.innerHTML=Object.entries(bal).map(([p,v])=>

`<div class="score">

<span>${p}</span>

<span class="${v>=0?"pos":"neg"}">

${fmt(v)}

</span>

</div>`

).join("")

}

function renderRounds(r){

rounds.innerHTML=r.map(i=>

`<div class="round">

#${i.idx}
${i.first_player}
>
${i.second_player}
>
${i.third_player}
>
${i.last_player}

</div>`

).join("")

}

loadSessions()

</script>

</body>
</html>
